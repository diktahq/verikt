<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#111110" />

  <!-- Subtle amber vignette -->
  <radialGradient id="vignette" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#E8913A" stop-opacity="0.07" />
    <stop offset="100%" stop-color="#111110" stop-opacity="0" />
  </radialGradient>
  <rect width="1200" height="630" fill="url(#vignette)" />

  <!-- Logo: ver (white) + ikt (amber) -->
  <text
    x="600" y="248"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="108"
    font-weight="700"
    text-anchor="middle"
    letter-spacing="-3"
  >
    <tspan fill="#ffffff">ver</tspan><tspan fill="#E8913A">ikt</tspan>
  </text>

  <!-- Tagline — italic serif, accent high colour -->
  <text
    x="600" y="318"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-style="italic"
    font-weight="400"
    fill="#F5D4A8"
    text-anchor="middle"
    letter-spacing="0.3"
  >Your architecture, in every agent session</text>

  <!-- Divider -->
  <line x1="440" y1="358" x2="760" y2="358" stroke="#2a2520" stroke-width="1" />

  <!-- Stats row -->
  <text x="340" y="400" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="600" fill="#E8913A" text-anchor="middle">4 architectures</text>
  <text x="340" y="424" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#555" text-anchor="middle">hexagonal · clean · layered · flat</text>

  <line x1="490" y1="390" x2="490" y2="432" stroke="#2a2520" stroke-width="1" />

  <text x="600" y="400" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="600" fill="#E8913A" text-anchor="middle">100+ capabilities</text>
  <text x="600" y="424" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#555" text-anchor="middle">Go · TypeScript · transport · data · security</text>

  <line x1="710" y1="390" x2="710" y2="432" stroke="#2a2520" stroke-width="1" />

  <text x="860" y="400" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="600" fill="#E8913A" text-anchor="middle">11 AST detectors</text>
  <text x="860" y="424" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#555" text-anchor="middle">enforce rules in CI · zero config</text>

  <!-- URL -->
  <text x="600" y="535" font-family="-apple-system, BlinkMacSystemFont, monospace" font-size="16" fill="#444" text-anchor="middle" letter-spacing="0.5">verikt.dev</text>
</svg>
