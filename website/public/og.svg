<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#111110" />

  <!-- Subtle amber vignette -->
  <radialGradient id="vignette" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#E8913A" stop-opacity="0.07" />
    <stop offset="100%" stop-color="#111110" stop-opacity="0" />
  </radialGradient>
  <rect width="1200" height="630" fill="url(#vignette)" />

  <!-- Logo: veri (white) + kt (amber) -->
  <text
    x="600" y="195"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="108"
    font-weight="700"
    text-anchor="middle"
    letter-spacing="-1"
  >
    <tspan fill="#ffffff">veri</tspan><tspan fill="#E8913A">kt</tspan>
  </text>

  <!-- Tagline -->
  <text
    x="600" y="260"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-style="italic"
    font-weight="400"
    fill="#F5D4A8"
    text-anchor="middle"
    letter-spacing="0.3"
  >Your architecture, in every agent session</text>

  <!-- Divider -->
  <line x1="300" y1="295" x2="900" y2="295" stroke="#2a2520" stroke-width="1" />

  <!-- Two columns — equal width, centered at 450 and 750 -->
  <!-- Go -->
  <text x="450" y="340" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">Go</text>
  <text x="450" y="370" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="600" fill="#E8913A" text-anchor="middle">63 capabilities</text>
  <text x="450" y="396" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" fill="#A8A29E" text-anchor="middle">hexagonal · clean · layered · flat</text>

  <!-- Column divider -->
  <line x1="600" y1="325" x2="600" y2="405" stroke="#2a2520" stroke-width="1" />

  <!-- TypeScript -->
  <text x="750" y="340" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">TypeScript</text>
  <text x="750" y="370" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="600" fill="#E8913A" text-anchor="middle">39 capabilities</text>
  <text x="750" y="396" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" fill="#A8A29E" text-anchor="middle">hexagonal · flat</text>

  <!-- Divider -->
  <line x1="300" y1="425" x2="900" y2="425" stroke="#2a2520" stroke-width="1" />

  <!-- Bottom row — centered at 450 and 750 to match columns above -->
  <text x="450" y="465" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="600" fill="#E8913A" text-anchor="middle">11 AST detectors</text>
  <text x="450" y="490" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#A8A29E" text-anchor="middle">enforce in CI</text>

  <line x1="600" y1="450" x2="600" y2="498" stroke="#2a2520" stroke-width="1" />

  <text x="750" y="465" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="600" fill="#E8913A" text-anchor="middle">4 AI agents</text>
  <text x="750" y="490" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#A8A29E" text-anchor="middle">Claude · Cursor · Copilot · Windsurf</text>

  <!-- URL — brighter so it's visible -->
  <text x="600" y="565" font-family="-apple-system, BlinkMacSystemFont, monospace" font-size="16" fill="#78716C" text-anchor="middle" letter-spacing="0.5">verikt.dev</text>
</svg>
