<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background matching the screenshot's dark tone -->
  <rect width="1200" height="630" fill="#111113" />

  <!-- Very subtle purple vignette -->
  <radialGradient id="vignette" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#6c63ff" stop-opacity="0.07" />
    <stop offset="100%" stop-color="#111113" stop-opacity="0" />
  </radialGradient>
  <rect width="1200" height="630" fill="url(#vignette)" />

  <!-- Logo: arch (white) + way (purple) — matching screenshot colors -->
  <text
    x="600" y="248"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="108"
    font-weight="700"
    text-anchor="middle"
    letter-spacing="-3"
  >
    <tspan fill="#ffffff">arch</tspan><tspan fill="#6c63ff">way</tspan>
  </text>

  <!-- Tagline — italic serif, accent colour, matching site style -->
  <text
    x="600" y="318"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-style="italic"
    font-weight="400"
    fill="#a89fe8"
    text-anchor="middle"
    letter-spacing="0.3"
  >Architecture-aware service composer and enforcer</text>

  <!-- Divider -->
  <line x1="440" y1="358" x2="760" y2="358" stroke="#2a2a35" stroke-width="1" />

  <!-- Stats row -->
  <text x="340" y="400" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="600" fill="#6c63ff" text-anchor="middle">4 architectures</text>
  <text x="340" y="424" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#555" text-anchor="middle">hexagonal · clean · layered · flat</text>

  <line x1="490" y1="390" x2="490" y2="432" stroke="#2a2a35" stroke-width="1" />

  <text x="600" y="400" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="600" fill="#6c63ff" text-anchor="middle">63 capabilities</text>
  <text x="600" y="424" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#555" text-anchor="middle">transport · data · security · more</text>

  <line x1="710" y1="390" x2="710" y2="432" stroke="#2a2a35" stroke-width="1" />

  <text x="860" y="400" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="600" fill="#6c63ff" text-anchor="middle">11 AST detectors</text>
  <text x="860" y="424" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#555" text-anchor="middle">enforce rules in CI · zero config</text>

  <!-- URL -->
  <text x="600" y="535" font-family="-apple-system, BlinkMacSystemFont, monospace" font-size="16" fill="#333" text-anchor="middle" letter-spacing="0.5">dcsg.github.io/archway</text>
</svg>
