<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#111110" />

  <!-- Subtle amber vignette -->
  <radialGradient id="vignette" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#E8913A" stop-opacity="0.07" />
    <stop offset="100%" stop-color="#111110" stop-opacity="0" />
  </radialGradient>
  <rect width="1200" height="630" fill="url(#vignette)" />

  <!-- Logo: veri (white) + k (amber) + t (white) -->
  <text
    x="600" y="200"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="108"
    font-weight="700"
    text-anchor="middle"
    letter-spacing="-1"
  >
    <tspan fill="#ffffff">veri</tspan><tspan fill="#E8913A" dx="2">k</tspan><tspan fill="#ffffff" dx="2">t</tspan>
  </text>

  <!-- Tagline — italic serif, accent high colour -->
  <text
    x="600" y="265"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-style="italic"
    font-weight="400"
    fill="#F5D4A8"
    text-anchor="middle"
    letter-spacing="0.3"
  >Your architecture, in every agent session</text>

  <!-- Divider -->
  <line x1="340" y1="300" x2="860" y2="300" stroke="#2a2520" stroke-width="1" />

  <!-- Two-column language stats -->
  <!-- Go column -->
  <text x="420" y="340" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">Go</text>
  <text x="420" y="370" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="600" fill="#E8913A" text-anchor="middle">63 capabilities</text>
  <text x="420" y="398" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" fill="#A8A29E" text-anchor="middle">hexagonal · clean · layered · flat</text>

  <!-- Divider between columns -->
  <line x1="600" y1="325" x2="600" y2="405" stroke="#2a2520" stroke-width="1" />

  <!-- TypeScript column -->
  <text x="780" y="340" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">TypeScript</text>
  <text x="780" y="370" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="600" fill="#E8913A" text-anchor="middle">39 capabilities</text>
  <text x="780" y="398" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" fill="#A8A29E" text-anchor="middle">hexagonal · flat</text>

  <!-- Bottom section -->
  <line x1="340" y1="430" x2="860" y2="430" stroke="#2a2520" stroke-width="1" />

  <text x="400" y="470" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="600" fill="#E8913A" text-anchor="middle">11 AST detectors</text>
  <text x="400" y="494" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#57534E" text-anchor="middle">enforce in CI</text>

  <line x1="530" y1="455" x2="530" y2="498" stroke="#2a2520" stroke-width="1" />

  <text x="670" y="470" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="600" fill="#E8913A" text-anchor="middle">4 AI agents</text>
  <text x="670" y="494" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#57534E" text-anchor="middle">Claude · Cursor · Copilot · Windsurf</text>

  <!-- URL -->
  <text x="600" y="560" font-family="-apple-system, BlinkMacSystemFont, monospace" font-size="16" fill="#444" text-anchor="middle" letter-spacing="0.5">verikt.dev</text>
</svg>
