id: EXP-05
name: "Does the prompt even matter?"
use_case: "Does the prompt even matter?"
hypothesis: >
  A lazy prompt with the guide (B) produces comparable output to a thorough prompt
  without the guide (C). The guide compensates for prompt quality.
type: greenfield
fixture: ~
fixture_delivery: none
tool_access: false
runs: 3
conditions:
  - id: A-lazy-noguide
    guide: false
    prompt_variant: lazy
  - id: B-lazy-guide
    guide: true
    prompt_variant: lazy
  - id: C-thorough-noguide
    guide: false
    prompt_variant: thorough
  - id: D-thorough-guide
    guide: true
    prompt_variant: thorough
metrics:
  primary: violations_arch
  secondary: [violations_total, passed, hexagonal_shape]
notes: >
  2x2 design. Flagship comparison: |violations_B - violations_C| <= 1.
  First run (2026-03-15, n=1): B=3 violations, C=7. Diff=4, claim failed.
  Guide is the dominant variable (shape changes), not prompt quality.
