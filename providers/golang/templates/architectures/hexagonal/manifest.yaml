name: hexagonal
description: "Hexagonal architecture with domain, ports, service, adapters, and platform layers"
variables:
  - name: ServiceName
    type: string
    required: true
    description: "Name of the service"
  - name: ModulePath
    type: string
    required: true
    description: "Go module path"
  - name: GoVersion
    type: string
    default: "1.22"
    description: "Go version for go.mod and Dockerfile"
path_mappings:
  adapter/httphandler: adapter/httphandler
  adapter/pgxrepo: adapter/pgxrepo
  adapter/grpchandler: adapter/grpchandler
  adapter/mysqlrepo: adapter/mysqlrepo
  adapter/redisrepo: adapter/redisrepo
  adapter/esrepo: adapter/esrepo
  adapter/kafkahandler: adapter/kafkahandler
  adapter/natshandler: adapter/natshandler
  adapter/bffgateway: adapter/bffgateway
  adapter/mailpit: adapter/mailpit
  domain: domain
  port: port
  service: service
components:
  - name: domain
    in: ["domain/**"]
    may_depend_on: []
  - name: ports
    in: ["port/**"]
    may_depend_on: [domain]
  - name: service
    in: ["service/**"]
    may_depend_on: [domain, ports]
  - name: adapters
    in: ["adapter/**"]
    may_depend_on: [ports, domain]
