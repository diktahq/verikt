# Go Language Feature Matrix
# Maps Go version features to flags used in templates.
# See ADR-008 for the design rationale.
features:
  - name: slices_package
    description: "stdlib slices package (slices.SortFunc, slices.Contains)"
    since: "1.21"
  - name: log_slog
    description: "stdlib structured logging (log/slog)"
    since: "1.21"
  - name: maps_package
    description: "stdlib maps package"
    since: "1.21"
  - name: range_over_int
    description: "for i := range n syntax"
    since: "1.22"
  - name: range_over_func
    description: "for x := range func syntax (iterators)"
    since: "1.23"
  - name: os_root
    description: "os.Root/os.OpenRoot for kernel-level path safety"
    since: "1.24"
  - name: weak_pointers
    description: "weak package for weak pointers"
    since: "1.24"
  - name: os_root_fs
    description: "os.Root implements fs.FS interface"
    since: "1.25"
  - name: synctest
    description: "testing/synctest for concurrent test control"
    since: "1.25"
  - name: generic_type_aliases
    description: "fully generic type aliases"
    since: "1.25"
