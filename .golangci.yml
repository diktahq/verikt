version: "2"

run:
  timeout: 5m
  tests: true

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - bodyclose
    - noctx
    - prealloc
  exclusions:
    paths:
      - ^experiments/
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
      - text: "strings.Title is deprecated"
        linters:
          - staticcheck
